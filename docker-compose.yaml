services:
  # ===========================================================================
  # Proxy
  # ===========================================================================
  polet-proxy:
    image: ghcr.io/harkon666/polet-proxy:${VERSION:-latest}
    container_name: polet-proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.polet-proxy.rule=Host(`api.polet.rifuki.dev`)"
      - "traefik.http.routers.polet-proxy.entrypoints=websecure"
      - "traefik.http.routers.polet-proxy.tls.certresolver=letsencrypt"
      - "traefik.http.services.polet-proxy.loadbalancer.server.port=3001"
    env_file:
      - ./proxy/.env
    volumes:
      - polet_ika_data:/app/.polet
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - polet-internal
      - traefik-public

networks:
  polet-internal:
    name: polet-internal
    driver: bridge
  traefik-public:
    name: traefik-public
    external: true

volumes:
  polet_ika_data:
    name: polet_ika_data
